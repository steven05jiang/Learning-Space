services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: learningspace
      POSTGRES_PASSWORD: learningspace
      POSTGRES_DB: learningspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/learningspace
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  neo4j_data: