name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # ── API ──────────────────────────────────────────────────────────────────

  api-lint:
    name: "API · Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: cd apps/api && uv sync --frozen --extra dev
      - run: cd apps/api && uv run ruff check .
      - run: cd apps/api && uv run ruff format --check .

  api-test:
    name: "API · Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: cd apps/api && uv sync --frozen --extra dev
      - run: cd apps/api && uv run pytest -m "not integration" -v
        env:
          JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum

  api-security:
    name: "API · Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: cd apps/api && uv sync --frozen --extra dev
      - name: Dependency vulnerability scan (pip-audit)
        # CVE-2024-23342: ecdsa transitive dep of python-jose; unused (using [cryptography] backend). BUG-001 tracks migration to authlib JWT.
        run: cd apps/api && uv run pip-audit --ignore-vuln CVE-2024-23342
        env:
          JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum
      - name: Static security analysis (bandit)
        run: cd apps/api && uv run bandit -r . -c pyproject.toml

  api-integration:
    name: "API · Integration Tests"
    runs-on: ubuntu-latest
    needs: [api-lint, api-test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: learningspace
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: learningspace_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/changeme
        ports:
          - "7474:7474"
          - "7687:7687"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: cd apps/api && uv sync --frozen --extra dev
      - name: Set up test database
        run: |
          cd apps/api
          # Drop and recreate the test database for a clean slate
          PGPASSWORD=changeme psql -h localhost -U learningspace -d postgres -c "DROP DATABASE IF EXISTS learningspace_test;"
          PGPASSWORD=changeme psql -h localhost -U learningspace -d postgres -c "CREATE DATABASE learningspace_test;"
          # Run migrations on the fresh test database
          uv run alembic upgrade head
      - name: Run integration tests
        run: |
          cd apps/api
          set +e
          uv run pytest -m integration -v
          exit_code=$?
          set -e
          # Exit code 5 = no tests collected; treat as pass until integration tests are written
          [ $exit_code -eq 5 ] && echo "No integration tests found — skipping" && exit 0
          exit $exit_code
        env:
          DATABASE_URL: postgresql+asyncpg://learningspace:changeme@localhost:5432/learningspace_test
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: changeme
          JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum
          ENVIRONMENT: test

  # ── Web ──────────────────────────────────────────────────────────────────

  web-lint-build:
    name: "Web · Lint + Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run lint
      - run: cd apps/web && npm run build

  web-security:
    name: "Web · Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd apps/web && npm ci
      - name: Dependency vulnerability scan (npm audit)
        # Remaining high-severity issues (GHSA-9g9p, GHSA-h25m) require Next.js 16 to fix. OPS-001 tracks the upgrade.
        run: cd apps/web && npm audit --audit-level=critical
