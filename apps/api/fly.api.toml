app = "learning-space-api"   # user will rename to their chosen app name
primary_region = "iad"        # US East (closest to Supabase/Neo4j US East 1)

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE_TYPE = "api"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "10s"
    type = "http"