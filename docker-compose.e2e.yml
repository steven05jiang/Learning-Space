services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: learningspace_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: learningspace_test
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    tmpfs:
      - /var/lib/postgresql/data  # Use tmpfs for faster test runs
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/test_password
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7475:7474"  # Different port to avoid conflicts
      - "7688:7687"
    tmpfs:
      - /data  # Use tmpfs for faster test runs

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # Disable persistence for tests

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile.test
    environment:
      - DATABASE_URL=postgresql://learningspace_test:test_password@postgres:5432/learningspace_test
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_AUTH=neo4j/test_password
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=test
      - LOG_LEVEL=WARNING
      - LLM_MOCK=true
      - OAUTH_MOCK=true
    ports:
      - "8001:8000"  # Different port to avoid conflicts
    depends_on:
      - postgres
      - neo4j
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile.test
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=test
    ports:
      - "3001:3000"  # Different port to avoid conflicts
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5